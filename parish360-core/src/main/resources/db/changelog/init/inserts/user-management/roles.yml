databaseChangeLog:
  - changeSet:
      id: insert-roles
      author: Sonu Abraham
      changes:
        - sql: >
            INSERT INTO roles (created_by,name,description,dataowner_id)
            SELECT 'initial_load', p.name, p.description, (SELECT id FROM parish)
            FROM permissions p
            WHERE 1=1;
        - insert:
            tableName: roles
            columns:
              - column:
                  name: created_by
                  value: initial_load
              - column:
                  name: name
                  value: super-admin
              - column:
                  name: description
                  value: All permissions role
              - column:
                  name: dataowner_id
                  valueComputed: "(SELECT id FROM parish)"
        - insert:
            tableName: roles
            columns:
              - column:
                  name: created_by
                  value: initial_load
              - column:
                  name: name
                  value: viewer
              - column:
                  name: description
                  value: All screens viewer role
              - column:
                  name: dataowner_id
                  valueComputed: "(SELECT id FROM parish)"
