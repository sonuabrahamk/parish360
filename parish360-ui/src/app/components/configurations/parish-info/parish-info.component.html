<div class="relative w-full min-h-[200px] overflow-hidden">
  <div
    *ngIf="parishInfoForm"
    [formGroup]="parishInfoForm"
    class="grid grid-cols-1 md:grid-cols-5 items-start gap-4 p-4"
  >
    <div
      class="flex flex-col items-center relative p-4 h-58"
      (mouseenter)="hover = true"
      (mouseleave)="hover = false"
    >
      <img [src]="profileImageUrl" class="profile-image w-auto h-full" />

      <!-- Hover overlay -->
      <div class="overlay" *ngIf="hover" (click)="fileInput.click()">
        <span>Update Logo</span>
      </div>

      <input
        type="file"
        #fileInput
        accept="image/*"
        (change)="onFileSelected($event)"
        hidden
      />
    </div>

    <div class="md:col-span-4 grid grid-cols-1 md:grid-cols-3 gap-6">
      <!-- Field 1 -->
      <div class="form-group">
        <label>Name</label>
        <input
          type="text"
          formControlName="name"
          [ngClass]="{ invalid: isInvalid('name') }"
        />
      </div>

      <!-- Field 2 -->
      <div class="form-group">
        <label>Denomination</label>
        <input type="text" formControlName="denomination" />
      </div>

      <!-- Field 3 -->
      <div class="form-group">
        <label>Patron</label>
        <input type="text" formControlName="patron" />
      </div>

      <!-- Field 4 -->
      <div class="form-group">
        <label>Mobile</label>
        <div class="col-span-2 grid md:grid-cols-7 gap-2">
          <select class="col-span-2" formControlName="dial_code">
            <option
              *ngFor="let country of countryCodes"
              [value]="country.dialCode"
            >
              {{ country.flag + " " + country.name }}
            </option>
          </select>
          <input
            type="text"
            formControlName="contact"
            class="lg:col-span-5"
            placeholder="Contact is required"
            [ngClass]="{ invalid: isInvalid('contact') }"
          />
        </div>
      </div>

      <!-- Field 5 -->
      <div class="form-group">
        <label>Email</label>
        <input
          type="email"
          formControlName="email"
          [ngClass]="{ invalid: isInvalid('email') }"
        />
      </div>

      <!-- Field 6 -->
      <div class="form-group">
        <label>Founded Date</label>
        <input type="date" formControlName="founded_date" />
      </div>

      <!-- Field 7 -->
      <div class="form-group">
        <label>Default Timezone</label>
        <select formControlName="timezone">
          <option *ngFor="let timezone of timezones" [value]="timezone">
            {{ timezone }}
          </option>
        </select>
      </div>

      <!-- Field 8 -->
      <div class="form-group">
        <label>Default Currency</label>
        <select formControlName="currency">
          <option *ngFor="let currency of currencies" [value]="currency.code">
            {{ currency.code }}
          </option>
        </select>
      </div>
    </div>

    <!-- Field 9 -->
    <!-- Place section -->
    <app-section-form [title]="'Place'" class="md:col-span-5">
      <div class="form-section-3" formGroupName="place">
        <!-- City -->
        <div class="form-group">
          <label>City</label>
          <input type="text" formControlName="city" />
        </div>
        <!-- State -->
        <div class="form-group">
          <label>State</label>
          <input type="text" formControlName="state" />
        </div>
        <!-- Country -->
        <div class="form-group">
          <label>Country</label>
          <input type="text" formControlName="country" />
        </div>
      </div>
    </app-section-form>
  </div>

  <app-footer
    *appCanEdit="screen"
    [isEditMode]="isEditMode"
    (modeUpdated)="onModeUpdated($event)"
  ></app-footer>
</div>
