name: parish360_mobile
description: "Mobile application for Parish360 core data."
publish_to: 'none' 
version: 1.0.0+1

environment:
  # Dart 3.10+ is standard for 2026 production apps
  sdk: '>=3.10.0 <4.0.0'
  # Flutter 3.38.5 is the recommended stable version for 2026
  flutter: '>=3.38.5'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State Management (Riverpod 3.0+ introduced in late 2025)
  flutter_riverpod: ^3.1.0 
  riverpod_annotation: ^4.0.0

  # Navigation (GoRouter 17.0+ for iOS 26 & Android 15 compatibility)
  go_router: ^17.0.0

  # Networking (Dio 5.6+ supports WASM and latest mobile SDKs)
  dio: ^5.6.0
  # Cookie Management for Dio
  dio_cookie_manager: ^3.1.0
  cookie_jar: ^4.0.8

  # REST API Client (Retrofit 4.9+ for modern code generation)
  retrofit: ^4.9.1
  json_annotation: ^4.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # Code Generation Tools (Essential for Riverpod & Retrofit)
  build_runner: ^2.4.13
  riverpod_generator: ^4.0.0+1
  retrofit_generator: ^10.2.1
  json_serializable: ^6.9.0
  # Optional: Type-safe route generation for GoRouter
  go_router_builder: ^4.1.3

flutter:
  uses-material-design: true
  assets:
    - assets/images/